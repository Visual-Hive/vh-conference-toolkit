name: Release — Package Tool Zips

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package Countdown Planner
        run: |
          mkdir -p dist
          cd event-countdown-planner
          zip -r ../dist/event-countdown-planner.zip . --exclude "*.DS_Store"
          cd ..

      - name: Package Ops Tracker
        run: |
          cd event-ops-tracker
          zip -r ../dist/event-ops-tracker.zip . \
            --exclude "*.DS_Store" \
            --exclude "data/db.json"
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/event-countdown-planner.zip
            dist/event-ops-tracker.zip
          body: |
            ## VH Conference Toolkit ${{ github.ref_name }}

            ### Downloads
            - **event-countdown-planner.zip** — open `index.html` in your browser. No install.
            - **event-ops-tracker.zip** — open `index.html` for browser mode, or run `setup.sh` (Mac/Linux) / `setup.bat` (Windows) for persistent local storage.

            See [README](https://github.com/Visual-Hive/vh-conference-toolkit#readme) for full instructions.
