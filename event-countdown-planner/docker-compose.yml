services:
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8081}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - json-server
    restart: unless-stopped

  json-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - ./data:/data
    restart: unless-stopped
